apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: nginx-app
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-cert
  namespace: nginx-app
spec:
  secretName: nginx-tls
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
  commonName: localhost
  dnsNames:
  - localhost
  - nginx-service
  - nginx-service.nginx-app
  - nginx-service.nginx-app.svc
  ipAddresses:
  - 127.0.0.1
