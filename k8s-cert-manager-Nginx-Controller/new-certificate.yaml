apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: letsencrypt-staging
  namespace: default
spec:
  dnsNames:
  - nginx.example.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: local-ca-issuer
  secretName: letsencrypt-staging
  usages:
  - digital signature
  - key encipherment
